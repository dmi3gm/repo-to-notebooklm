name: FPF for NotebookLM

on:
  schedule:
    - cron: '0 0 * * 0' # Каждое воскресенье в 00:00
  workflow_dispatch:      # Кнопка для ручного запуска

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download source file
        run: |
          # ЗАМЕНИТЕ URL НИЖЕ НА ВАШ (RAW ссылка)
          curl -sSL "https://github.com/ailev/FPF/blob/main/FPF-Spec.md" -o source.md
          if [ ! -s source.md ]; then echo "🟥 ERR: Download failed"; exit 1; fi

      - name: Execute split script
        run: python3 scripts/split_md.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "devops-bot@local"
          git config --local user.name "DevOps Bot"
          git add out_ntbklm/*.md
          
          if git diff --staged --quiet; then
            echo "🟩 INFO: No changes detected"
          else
            git commit -m "Auto-update NotebookLM chunks: $(date +'%Y-%m-%d')"
            git push
          fi

 
