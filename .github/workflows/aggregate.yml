name: Aggregate Repos for NotebookLM

on:
  workflow_dispatch: # Запуск кнопкой
  schedule:
    - cron: '0 2 * * 1' # Раз в неделю (ночь понедельника)

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # СПИСОК РЕПОЗИТОРИЕВ ЧЕРЕЗ ПРОБЕЛ
  REPOS: "https://github.com/TserenTserenov/ZP.git https://github.com/TserenTserenov/SPF.git https://github.com/TserenTserenov/PACK-MIM.git https://github.com/TserenTserenov/PACK-autonomous-agents.git https://github.com/TserenTserenov/PACK-education.git https://github.com/TserenTserenov/FMT-s2r.git https://github.com/TserenTserenov/PACK-digital-platform.git"

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Aggregator
        run: python3 scripts/aggregate.py

      - name: Commit and Push
        run: |
          git config --local user.email "devops-bot@local"
          git config --local user.name "DevOps Bot"
          git add out_ntbklm/*.md
          if ! git diff --staged --quiet; then
            git commit -m "Aggregated NotebookLM docs: $(date +'%Y-%m-%d')"
            git push
          else
            echo "No changes found."
          fi
